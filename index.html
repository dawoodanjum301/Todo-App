<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dawood Task Manager</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      margin: 20px auto;
      width: 350px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input {
      width: 65%;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .clear-btn {
      margin-top: 10px;
      background: red;
      width: 100%;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #0f172a;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: red;
      padding: 5px 8px;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📝 Dawood's Task Manager</h1>

<div class="container">
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>

  <button class="clear-btn" onclick="clearTasks()">Clear All</button>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

  function saveTasks() {
    localStorage.setItem("tasks", JSON.stringify(tasks));
  }

  function renderTasks() {
    let list = document.getElementById("taskList");
    list.innerHTML = "";

    tasks.forEach((task, index) => {
      let li = document.createElement("li");

      li.innerHTML = `
        <span class="${task.done ? 'done' : ''}" onclick="toggleDone(${index})">
          ${task.text}
        </span>
        <span class="delete" onclick="deleteTask(${index})">X</span>
      `;

      list.appendChild(li);
    });
  }

  function addTask() {
    let input = document.getElementById("taskInput");
    let text = input.value.trim();

    if (text === "") return;

    tasks.push({ text: text, done: false });
    input.value = "";

    saveTasks();
    renderTasks();
  }

  function toggleDone(index) {
    tasks[index].done = !tasks[index].done;
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  function clearTasks() {
    tasks = [];
    saveTasks();
    renderTasks();
  }

  document.getElementById("taskInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      addTask();
    }
  });

  renderTasks();
</script>

</body>
</html>
