<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title><h1>📝 Dawood's Task Manager</h1></title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      margin: 20px auto;
      width: 300px;
    }

    input {
      width: 70%;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #1e293b;
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }

    .delete {
      background: red;
      padding: 5px;
      border-radius: 3px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>📝 My To-Do App</h1>

<div class="container">
  <input type="text" id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
  function addTask() {
    let input = document.getElementById("taskInput");
    let taskText = input.value;

    if (taskText === "") return;

    let li = document.createElement("li");
    li.innerHTML = `
      <span onclick="toggleDone(this)">${taskText}</span>
      <span class="delete" onclick="deleteTask(this)">X</span>
    `;

    document.getElementById("taskList").appendChild(li);
    input.value = "";
  }

  function toggleDone(element) {
    element.classList.toggle("done");
  }

  function deleteTask(element) {
    element.parentElement.remove();
  }
</script>

</body>
</html>
